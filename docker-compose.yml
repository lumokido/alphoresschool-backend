
services:
  postgres:
    image: postgres:16-alpine
    container_name: lumo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lumo}
      POSTGRES_USER: ${POSTGRES_USER:-lumo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lumo}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lumo} -d ${POSTGRES_DB:-lumo}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lumo-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-lumo}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-lumo}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-lumo}
      APP_JWT_SECRET: ${APP_JWT_SECRET:-changeme-dev-only-replace-in-production}
      APP_JWT_TEACHER_SECRET: ${APP_JWT_TEACHER_SECRET:-changeme-teacher-dev-only}
      APP_JWT_STUDENT_SECRET: ${APP_JWT_STUDENT_SECRET:-changeme-student-dev-only}
    env_file:
      - path: .env
        required: false
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 90s

volumes:
  postgres_data:
    driver: local
